apiVersion: v1
kind: Secret
metadata:
  name: prepai-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:password@postgres-service:5432/mockinterview"
  OPENAI_API_KEY: "your-openai-api-key-here"
  SECRET_KEY: "your-jwt-secret-key-here"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  POSTGRES_PASSWORD: "password"