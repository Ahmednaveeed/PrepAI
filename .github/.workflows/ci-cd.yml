name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build and push backend image
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ahmednaveeed/prepai-backend:${{ github.sha }}

      # Step 4: Build and push frontend image
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ahmednaveeed/prepai-frontend:${{ github.sha }}

      # Step 5: Build and push database image
      - name: Build and push database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ahmednaveeed/prepai-database:${{ github.sha }}

      # Step 6: Update image tags in Kubernetes manifests
      - name: Update image tags in manifests
        run: |
          sed -i "s|ahmednaveeed/prepai-backend:.*|ahmednaveeed/prepai-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|ahmednaveeed/prepai-frontend:.*|ahmednaveeed/prepai-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          sed -i "s|ahmednaveeed/prepai-database:.*|ahmednaveeed/prepai-database:${{ github.sha }}|g" k8s/postgres-deployment.yaml

      # Step 7: Update secrets with real values from GitHub Secrets
      - name: Inject real secrets into secret.yaml
        run: |
          sed -i "s|your-openai-api-key-here|${{ secrets.OPENAI_API_KEY }}|g" k8s/secret.yaml
          sed -i "s|your-jwt-secret-key-here|${{ secrets.SECRET_KEY }}|g" k8s/secret.yaml
          sed -i "s|POSTGRES_PASSWORD: \"password\"|POSTGRES_PASSWORD: \"${{ secrets.POSTGRES_PASSWORD }}\"|g" k8s/secret.yaml

      # Step 8: Commit and push updated manifests back to GitHub
      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push